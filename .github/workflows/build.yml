name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install Flet and build
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.21.0
      
      - name: Build APK
        run: |
          yes | flet build apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rancas-prueba-apk
          path: |
            build/apk/*.apk
            build/app/outputs/flutter-apk/*.apk