name: Build Rancas Prueba APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Flet
        run: |
          pip install flet==0.24.0
          pip install flet-cli==0.24.0
      
      - name: Build APK
        run: flet build apk --split-per-abi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rancas-prueba-apk
          path: build/apk/*.apk